// src/app.js
const appRoot = document.getElementById("appRoot");
const lessonFileInput = document.getElementById("lessonFileInput");
const positiveSoundInput = document.getElementById("positiveSoundInput");

const lessonDb = new LessonDatabase();
const settingsStore = new SettingsStore();
const model = new AppModel({ settingsStore, lessonDb });
const annotationService = new AnnotationService();
const behaviorService = new BehaviorService(settingsStore);

const state = {
  screen: "loading",
  selectedRosterHour: "",
  selectedLessonClass: "",
  lessonRecords: [],
  lessonOrderDraft: [],
  currentHour: "",
  currentClass: "",
  lessonIndex: 0,
  markdownSlideIndex: 0,
  behaviorMenuOpen: false,
  quickAddStudentOpen: false,
  selectedBehavior: null,
  coldCallName: "",
  coldCallRemaining: [],
  coldCallUsed: [],
  reportFilters: getDefaultReportFilters()
};

let positiveAudio = null;

function showMessage(message) {
  window.alert(message);
}

function getDefaultReportFilters() {
  const today = new Date().toISOString().split("T")[0];
  const thirtyDaysAgo = new Date(Date.now() - (30 * 24 * 60 * 60 * 1000)).toISOString().split("T")[0];
  return {
    dateFrom: thirtyDaysAgo,
    dateTo: today,
    className: "",
    studentQuery: "",
    type: ""
  };
}

function resetColdCallRotation() {
  state.coldCallUsed = [];
  state.coldCallRemaining = model.getRoster(state.currentHour).slice();
}

function playPositiveFeedbackSound() {
  const dataUrl = settingsStore.loadPositiveSound();
  if (!dataUrl) {
    return;
  }
  if (!positiveAudio) {
    positiveAudio = new Audio();
  }
  positiveAudio.src = dataUrl;
  positiveAudio.currentTime = 0;
  positiveAudio.volume = 0.4;
  positiveAudio.play().catch(() => {});
}

function getNextColdCallStudent() {
  if (!state.coldCallRemaining.length) {
    resetColdCallRotation();
  }
  if (!state.coldCallRemaining.length) {
    return "";
  }
  const randomIndex = Math.floor(Math.random() * state.coldCallRemaining.length);
  const [student] = state.coldCallRemaining.splice(randomIndex, 1);
  state.coldCallUsed.push(student);
  return student;
}

function getHoursVm() {
  return hourLabels.map((hour) => ({
    hour,
    className: model.hourMappings[hour] || ""
  }));
}

function getCurrentLessonRecord() {
  return state.lessonRecords[state.lessonIndex] || null;
}

function getActiveLessonImportClass() {
  if (state.screen === "lesson") {
    return state.currentClass || "";
  }
  return state.selectedLessonClass || "";
}

function getCurrentAnnotationKey() {
  const record = getCurrentLessonRecord();
  const recordId = record?.id ?? `idx-${state.lessonIndex}`;
  const markdownPart = record?.type === "markdown" ? `slide-${state.markdownSlideIndex}` : "pdf";
  return `${state.currentHour}::${state.currentClass}::${recordId}::${markdownPart}`;
}

function drawStroke(ctx, stroke) {
  if (!stroke?.points?.length) {
    return;
  }

  const config = annotationService.getConfig(stroke.tool);
  ctx.globalCompositeOperation = config.composite;
  ctx.globalAlpha = config.alpha;
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = config.width;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
  for (let index = 1; index < stroke.points.length; index += 1) {
    ctx.lineTo(stroke.points[index].x, stroke.points[index].y);
  }
  if (stroke.points.length === 1) {
    ctx.lineTo(stroke.points[0].x + 0.01, stroke.points[0].y + 0.01);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";
}

function redrawAnnotationCanvas(canvas, lessonKey) {
  if (!canvas) {
    return;
  }
  const ctx = canvas.getContext("2d");
  if (!ctx) {
    return;
  }

  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  annotationService.getLessonStrokes(lessonKey).forEach((stroke) => drawStroke(ctx, stroke));
}

function resizeAnnotationCanvas(canvas, lessonKey) {
  if (!canvas) {
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.round(rect.width * dpr));
  canvas.height = Math.max(1, Math.round(rect.height * dpr));
  redrawAnnotationCanvas(canvas, lessonKey);
}

function initializeAnnotationOverlay(lessonKey) {
  const canvas = document.getElementById("annotationCanvas");
  if (!canvas) {
    return;
  }

  resizeAnnotationCanvas(canvas, lessonKey);

  if (canvas.dataset.bound === "1") {
    return;
  }

  canvas.dataset.bound = "1";

  const getPoint = (event) => {
    const rect = canvas.getBoundingClientRect();
    return {
      x: event.clientX - rect.left,
      y: event.clientY - rect.top
    };
  };

  canvas.addEventListener("pointerdown", (event) => {
    if (!annotationService.mode) {
      return;
    }
    if (event.pointerType === "mouse" && event.button !== 0) {
      return;
    }
    const activeKey = getCurrentAnnotationKey();
    const point = getPoint(event);
    annotationService.startStroke(activeKey, event.pointerId, point);
    canvas.setPointerCapture(event.pointerId);
    redrawAnnotationCanvas(canvas, activeKey);
    event.preventDefault();
  });

  canvas.addEventListener("pointermove", (event) => {
    const activeKey = getCurrentAnnotationKey();
    if (!annotationService.mode) {
      return;
    }
    if (!annotationService.appendPoint(event.pointerId, getPoint(event))) {
      return;
    }
    redrawAnnotationCanvas(canvas, activeKey);
    event.preventDefault();
  });

  canvas.addEventListener("touchmove", (event) => {
    if (!annotationService.mode) {
      return;
    }
    event.preventDefault();
  }, { passive: false });

  const endStroke = (event) => {
    annotationService.endStroke(event.pointerId);
  };

  canvas.addEventListener("pointerup", endStroke);
  canvas.addEventListener("pointercancel", endStroke);
}

function persistLessonSession() {
  if (state.screen !== "lesson" || !state.currentHour || !state.currentClass || !state.lessonRecords.length) {
    return;
  }

  const currentRecord = state.lessonRecords[state.lessonIndex];
  model.saveSession({
    hour: state.currentHour,
    className: state.currentClass,
    lessonIndex: state.lessonIndex,
    recordId: currentRecord?.id ?? null,
    markdownSlideIndex: state.markdownSlideIndex
  });
}

function getWarningCategories() {
  return Object.keys(behaviorService.getWarningMap(state.currentHour)).sort((left, right) => left.localeCompare(right));
}

function resolveBehaviorSelection(selection) {
  if (!selection) {
    return null;
  }
  const warningMap = behaviorService.getWarningMap(state.currentHour);
  const bonus = selection.type === "negative" && warningMap[selection.category] ? 1 : 0;
  return {
    ...selection,
    points: selection.type === "negative" ? Math.max(0, Number(selection.points || 0)) + bonus : 0
  };
}

function logBehavior(studentName) {
  const trimmedName = String(studentName || "").trim();
  if (!trimmedName) {
    showMessage("Choose a student first.");
    return;
  }

  if (!state.selectedBehavior) {
    showMessage("Select a behavior first.");
    return;
  }

  const entry = {
    timestamp: new Date().toISOString(),
    class: state.currentClass,
    hour: state.currentHour,
    student: trimmedName,
    type: state.selectedBehavior.type,
    category: state.selectedBehavior.category,
    points: state.selectedBehavior.type === "negative" ? state.selectedBehavior.points : 0
  };

  behaviorService.addLog(entry);
  state.selectedBehavior = null;
  if (entry.type === "positive") {
    playPositiveFeedbackSound();
  }
  render();
}

function exportLogsCsv(logs) {
  const csv = behaviorService.exportCsv(logs);
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = `behavior-report-${new Date().toISOString().split("T")[0]}.csv`;
  anchor.click();
  URL.revokeObjectURL(url);
}

async function restoreLessonSession() {
  const saved = model.loadSession();
  if (!saved?.hour || !saved?.className) {
    return false;
  }

  if ((model.hourMappings[saved.hour] || "") !== saved.className) {
    model.clearSession();
    return false;
  }

  const records = await model.getLessonSequenceForClass(saved.className);

  state.currentHour = saved.hour;
  state.currentClass = saved.className;
  state.lessonRecords = records;
  state.lessonIndex = Math.min(Math.max(Number(saved.lessonIndex || 0), 0), records.length - 1);

  if (saved.recordId != null) {
    const matchIndex = records.findIndex((record) => Number(record.id) === Number(saved.recordId));
    if (matchIndex >= 0) {
      state.lessonIndex = matchIndex;
    }
  }

  state.markdownSlideIndex = Math.max(Number(saved.markdownSlideIndex || 0), 0);
  state.screen = "lesson";
  return true;
}

function updateLessonOrderDraft(moveId, direction) {
  const ids = state.lessonOrderDraft;
  const currentIndex = ids.findIndex((id) => Number(id) === Number(moveId));
  const nextIndex = currentIndex + direction;
  if (currentIndex < 0 || nextIndex < 0 || nextIndex >= ids.length) {
    return;
  }

  const [entry] = ids.splice(currentIndex, 1);
  ids.splice(nextIndex, 0, entry);
  const orderedMap = new Map(ids.map((id, index) => [Number(id), index]));
  state.lessonRecords = state.lessonRecords.slice().sort((left, right) => orderedMap.get(Number(left.id)) - orderedMap.get(Number(right.id)));
}

function render() {
  if (state.screen === "setup") {
    renderSetupScreen(appRoot, {
      classOptions: model.classOptions,
      hourMappings: model.hourMappings
    }, {
      applyClassList(text) {
        try {
          model.saveClassList(text);
          render();
        } catch (error) {
          showMessage(error.message);
        }
      },
      finishSetup(text) {
        try {
          model.saveClassList(text);
          state.screen = "home";
          render();
        } catch (error) {
          showMessage(error.message);
        }
      },
      setHourMapping(hour, className) {
        model.setHourMapping(hour, className);
      }
    });
    return;
  }

  if (state.screen === "home") {
    renderHomeScreen(appRoot, {
      hours: model.getHoursViewModel(),
      metrics: model.getMetrics()
    }, {
      openAdmin() {
        state.screen = "admin";
        if (!state.selectedRosterHour) {
          state.selectedRosterHour = hourLabels.find((hour) => !!model.hourMappings[hour]) || "";
        }
        render();
      },
      openRosterHour(hour) {
        state.selectedRosterHour = hour;
        state.screen = "admin";
        render();
      },
      openSetup() {
        state.screen = "setup";
        render();
      },
      async openHour(hour) {
        const className = model.hourMappings[hour];
        if (!className) {
          showMessage("This hour is not mapped yet.");
          return;
        }

        const records = await model.getLessonSequenceForClass(className);

        state.currentHour = hour;
        state.currentClass = className;
        state.lessonRecords = records;
        state.lessonIndex = 0;
        state.markdownSlideIndex = 0;
        state.behaviorMenuOpen = false;
        state.quickAddStudentOpen = false;
        state.selectedBehavior = null;
        state.coldCallName = "";
        resetColdCallRotation();
        state.screen = "lesson";
        persistLessonSession();
        render();
      }
    });
    return;
  }

  if (state.screen === "admin") {
    renderAdminScreen(appRoot, {
      classOptions: model.classOptions,
      hours: getHoursVm(),
      selectedRosterHour: state.selectedRosterHour,
      roster: state.selectedRosterHour ? model.getRoster(state.selectedRosterHour) : [],
      selectedLessonClass: state.selectedLessonClass,
      lessonCounts: model.lessonCounts,
      lessonRecords: state.lessonRecords
    }, {
      backHome() {
        state.screen = "home";
        render();
      },
      saveClassList(text) {
        try {
          model.saveClassList(text);
          state.selectedLessonClass = "";
          state.lessonRecords = [];
          render();
          showMessage("Class list saved.");
        } catch (error) {
          showMessage(error.message);
        }
      },
      setHourMapping(hour, className) {
        model.setHourMapping(hour, className);
      },
      selectRosterHour(hour) {
        state.selectedRosterHour = hour;
        render();
      },
      saveRoster(hour, text) {
        if (!hour) {
          showMessage("Select an hour first.");
          return;
        }
        const roster = model.saveRoster(hour, text);
        render();
        showMessage(`Saved ${roster.length} student${roster.length === 1 ? "" : "s"} for ${hour}.`);
      },
      async selectLessonClass(className) {
        state.selectedLessonClass = className;
        state.lessonRecords = className ? await model.getLessonsForClass(className) : [];
        state.lessonOrderDraft = state.lessonRecords.map((record) => record.id);
        render();
      },
      addLessonFile() {
        if (!state.selectedLessonClass) {
          showMessage("Select a class first.");
          return;
        }
        lessonFileInput.click();
      },
      async saveMarkdownText(title, content) {
        if (!state.selectedLessonClass) {
          showMessage("Select a class first.");
          return;
        }
        if (!String(content).trim()) {
          showMessage("Paste markdown content first.");
          return;
        }

        await model.addMarkdownText(state.selectedLessonClass, title.trim(), content);
        state.lessonRecords = await model.getLessonsForClass(state.selectedLessonClass);
        state.lessonOrderDraft = state.lessonRecords.map((record) => record.id);
        render();
        showMessage(`Saved markdown lesson for ${state.selectedLessonClass}.`);
      },
      async clearClassLessons() {
        if (!state.selectedLessonClass) {
          showMessage("Select a class first.");
          return;
        }
        if (!window.confirm(`Clear saved lessons for ${state.selectedLessonClass}?`)) {
          return;
        }
        await model.clearLessonsForClass(state.selectedLessonClass);
        state.lessonRecords = [];
        state.lessonOrderDraft = [];
        render();
        showMessage(`Cleared saved lessons for ${state.selectedLessonClass}.`);
      },
      async clearAllLessons() {
        if (!window.confirm("Clear all saved lessons? This cannot be undone.")) {
          return;
        }
        await model.clearAllLessons();
        state.lessonRecords = [];
        state.lessonOrderDraft = [];
        render();
        showMessage("All saved lessons cleared.");
      },
      chooseSound() {
        positiveSoundInput.click();
      },
      previewSound() {
        if (!settingsStore.loadPositiveSound()) {
          showMessage("No custom sound selected.");
          return;
        }
        playPositiveFeedbackSound();
      },
      clearSound() {
        if (!window.confirm("Clear the saved positive feedback sound?")) {
          return;
        }
        settingsStore.clearPositiveSound();
        if (positiveSoundInput) {
          positiveSoundInput.value = "";
        }
        render();
      },
      openReport() {
        state.screen = "report";
        render();
      },
      moveLesson(recordId, direction) {
        updateLessonOrderDraft(recordId, direction);
        render();
      },
      async saveLessonOrder() {
        if (!state.selectedLessonClass || state.lessonOrderDraft.length < 2) {
          return;
        }
        await model.reorderLessons(state.selectedLessonClass, state.lessonOrderDraft);
        state.lessonRecords = await model.getLessonsForClass(state.selectedLessonClass);
        state.lessonOrderDraft = state.lessonRecords.map((record) => record.id);
        render();
        showMessage(`Saved lesson order for ${state.selectedLessonClass}.`);
      }
    });
    return;
  }

  if (state.screen === "report") {
    const filteredLogs = behaviorService.getFilteredLogs(state.reportFilters);
    renderReportScreen(appRoot, {
      filters: state.reportFilters,
      classOptions: model.classOptions,
      logs: filteredLogs,
      stats: behaviorService.getReportStats(filteredLogs)
    }, {
      backAdmin() {
        state.screen = "admin";
        render();
      },
      updateFilters(nextFilters) {
        state.reportFilters = nextFilters;
        render();
      },
      exportCsv() {
        if (!filteredLogs.length) {
          showMessage("No data to export.");
          return;
        }
        exportLogsCsv(filteredLogs);
      },
      clearLogs() {
        if (!window.confirm("Clear all behavior logs? This cannot be undone.")) {
          return;
        }
        behaviorService.clearLogs();
        render();
      }
    });
    return;
  }

  if (state.screen === "lesson") {
    const lessonStage = buildLessonStageModel(getCurrentLessonRecord(), state.markdownSlideIndex);
    const hourSummary = behaviorService.getHourSummary(state.currentHour, state.currentClass);
    const annotationKey = getCurrentAnnotationKey();
    renderLessonScreen(appRoot, {
      currentHour: state.currentHour,
      currentClass: state.currentClass,
      lessonRecords: state.lessonRecords,
      lessonIndex: state.lessonIndex,
      markdownSlideIndex: state.markdownSlideIndex,
      behaviorMenuOpen: state.behaviorMenuOpen,
      quickAddStudentOpen: state.quickAddStudentOpen,
      selectedBehavior: state.selectedBehavior,
      coldCallName: state.coldCallName,
      coldCallRemaining: state.coldCallRemaining.length,
      warningCategories: getWarningCategories(),
      roster: model.getRoster(state.currentHour),
      recentLogs: hourSummary.recentLogs,
      annotation: annotationService.getViewModel(annotationKey),
      lessonStage
    }, {
      backHome() {
        model.clearSession();
        state.screen = "home";
        state.lessonRecords = [];
        state.lessonIndex = 0;
        state.markdownSlideIndex = 0;
        state.behaviorMenuOpen = false;
        state.quickAddStudentOpen = false;
        state.selectedBehavior = null;
        render();
      },
      previous(markdownSlideCount) {
        const record = state.lessonRecords[state.lessonIndex];
        if (record?.type === "markdown" && state.markdownSlideIndex > 0) {
          state.markdownSlideIndex -= 1;
          persistLessonSession();
          render();
          return;
        }

        if (state.lessonRecords.length > 1) {
          state.lessonIndex = (state.lessonIndex - 1 + state.lessonRecords.length) % state.lessonRecords.length;
          state.markdownSlideIndex = 0;
          persistLessonSession();
          render();
          return;
        }

        if (record?.type === "markdown" && markdownSlideCount > 0) {
          state.markdownSlideIndex = 0;
          persistLessonSession();
          render();
        }
      },
      next(markdownSlideCount) {
        const record = state.lessonRecords[state.lessonIndex];
        if (record?.type === "markdown" && state.markdownSlideIndex < markdownSlideCount - 1) {
          state.markdownSlideIndex += 1;
          persistLessonSession();
          render();
          return;
        }

        if (state.lessonRecords.length > 1) {
          state.lessonIndex = (state.lessonIndex + 1) % state.lessonRecords.length;
          state.markdownSlideIndex = 0;
          persistLessonSession();
          render();
        }
      },
      openLessonFile() {
        if (!state.currentClass) {
          showMessage("No class is active for this lesson.");
          return;
        }
        lessonFileInput.click();
      },
      coldCall() {
        const student = getNextColdCallStudent();
        if (!student) {
          showMessage("No students available in this hour.");
          return;
        }
        state.coldCallName = student;
        render();
      },
      toggleBehaviorMenu() {
        state.behaviorMenuOpen = !state.behaviorMenuOpen;
        render();
      },
      toggleQuickAddStudent() {
        state.quickAddStudentOpen = !state.quickAddStudentOpen;
        render();
      },
      clearSelectedBehavior() {
        state.selectedBehavior = null;
        render();
      },
      closeBehaviorMenu() {
        if (!state.behaviorMenuOpen) {
          return;
        }
        state.behaviorMenuOpen = false;
        render();
      },
      selectBehavior(selection) {
        state.selectedBehavior = resolveBehaviorSelection(selection);
        state.behaviorMenuOpen = true;
        render();
      },
      logBehavior(studentName) {
        logBehavior(studentName);
      },
      quickAddStudent(name) {
        const trimmed = String(name || "").trim();
        if (!trimmed) {
          showMessage("Enter a student name.");
          return;
        }
        const currentRoster = model.getRoster(state.currentHour);
        if (currentRoster.includes(trimmed)) {
          showMessage(`${trimmed} is already in ${state.currentHour}.`);
          return;
        }
        model.saveRoster(state.currentHour, `${currentRoster.join("\n")}${currentRoster.length ? "\n" : ""}${trimmed}`);
        state.quickAddStudentOpen = false;
        resetColdCallRotation();
        render();
      },
      toggleAnnotationMode() {
        annotationService.toggleMode();
        render();
      },
      toggleAnnotationToolbarPosition() {
        annotationService.toggleToolbarPosition();
        render();
      },
      setAnnotationTool(tool) {
        annotationService.setTool(tool);
        render();
      },
      setAnnotationColor(color) {
        annotationService.setColor(color);
        render();
      },
      undoAnnotation() {
        annotationService.undo(annotationKey);
        render();
      },
      clearAnnotations() {
        annotationService.clear(annotationKey);
        render();
      }
    });
    initializeLessonStage(lessonStage);
    initializeAnnotationOverlay(annotationKey);
  }
}

lessonFileInput?.addEventListener("change", async (event) => {
  const files = Array.from(event.target.files || []);
  const targetClass = getActiveLessonImportClass();
  event.target.value = "";
  if (!files.length || !targetClass) {
    return;
  }

  try {
    const result = await model.addLessonFiles(targetClass, files);

    if (state.screen === "lesson" && state.currentClass === targetClass) {
      state.lessonRecords = await model.getLessonSequenceForClass(targetClass);
      if (result.addedCount > 0) {
        state.lessonIndex = Math.max(0, state.lessonRecords.length - 1 - result.addedCount);
      }
      state.markdownSlideIndex = 0;
      persistLessonSession();
    }

    if (state.selectedLessonClass === targetClass) {
      state.lessonRecords = await model.getLessonsForClass(targetClass);
      state.lessonOrderDraft = state.lessonRecords.map((record) => record.id);
    }

    render();

    if (!result.pdfCount && !result.markdownCount && !result.docxCount) {
      showMessage("No supported lesson files were selected.");
      return;
    }

    const parts = [];
    if (result.pdfCount) {
      parts.push(`${result.pdfCount} PDF${result.pdfCount === 1 ? "" : "s"}`);
    }
    if (result.markdownCount) {
      parts.push(`${result.markdownCount} markdown file${result.markdownCount === 1 ? "" : "s"}`);
    }
    if (result.docxCount) {
      parts.push(`${result.docxCount} DOCX file${result.docxCount === 1 ? "" : "s"}`);
    }
    const unsupportedSuffix = result.unsupportedCount
      ? ` Ignored unsupported file${result.unsupportedCount === 1 ? "" : "s"}: ${result.unsupportedNames.join(", ")}.`
      : "";
    showMessage(`Added ${parts.join(" and ")} for ${targetClass}.${unsupportedSuffix}`);
  } catch (error) {
    showMessage(String(error?.message || error || "Unable to import lesson files."));
  }
});

positiveSoundInput?.addEventListener("change", (event) => {
  const file = event.target.files?.[0];
  if (!file) {
    return;
  }
  if (!file.type.startsWith("audio/")) {
    showMessage("Please choose an audio file.");
    event.target.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    try {
      settingsStore.savePositiveSound(String(reader.result || ""));
      render();
      showMessage("Positive feedback sound saved locally.");
    } catch (error) {
      showMessage("Unable to save sound locally. Try a smaller file.");
    }
  };
  reader.readAsDataURL(file);
});

document.addEventListener("keydown", (event) => {
  if (state.screen !== "lesson") {
    return;
  }

  const targetTag = event.target?.tagName?.toLowerCase?.() || "";
  if (["input", "textarea", "select"].includes(targetTag) || event.target?.isContentEditable) {
    return;
  }

  if (event.key === "ArrowLeft") {
    appRoot.querySelector("#prevLessonBtn")?.click();
    event.preventDefault();
  }

  if (event.key === "ArrowRight") {
    appRoot.querySelector("#nextLessonBtn")?.click();
    event.preventDefault();
  }

  const key = String(event.key || "").toLowerCase();
  if (key === "p") {
    annotationService.setTool("pen");
    render();
    event.preventDefault();
  }
  if (key === "h") {
    annotationService.setTool("highlighter");
    render();
    event.preventDefault();
  }
  if (key === "e") {
    annotationService.setTool("eraser");
    render();
    event.preventDefault();
  }
  if (key === "u") {
    annotationService.undo(getCurrentAnnotationKey());
    render();
    event.preventDefault();
  }
});

window.addEventListener("resize", () => {
  if (state.screen !== "lesson") {
    return;
  }
  initializeAnnotationOverlay(getCurrentAnnotationKey());
});

async function bootstrap() {
  appRoot.innerHTML = '<section class="screen shell-card panel"><div class="eyebrow">Loading</div><h1 style="margin: 12px 0 0;">Preparing lesson cockpit...</h1></section>';
  await lessonDb.init();
  await model.hydrate();
  const restored = model.needsSetup() ? false : await restoreLessonSession();

  if (restored) {
    resetColdCallRotation();
    render();
    return;
  }

  state.screen = model.needsSetup() ? "setup" : "home";
  if (!state.selectedRosterHour) {
    state.selectedRosterHour = hourLabels.find((hour) => !!model.hourMappings[hour]) || "";
  }
  render();
}

bootstrap().catch((error) => {
  appRoot.innerHTML = `
    <section class="screen shell-card panel">
      <div class="eyebrow">Startup error</div>
      <h1 style="margin: 12px 0 8px;">Unable to start the app.</h1>
      <p class="subhead">${String(error?.message || error)}</p>
    </section>
  `;
});

  </script>
</body>
</html>
