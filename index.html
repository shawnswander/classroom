<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson Cockpit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <style>
:root {
  color-scheme: light;
  --bg: #f2efe7;
  --bg-strong: #efe6d6;
  --panel: rgba(255, 252, 246, 0.84);
  --panel-strong: #fffaf2;
  --panel-border: rgba(97, 74, 40, 0.14);
  --ink: #1f1b16;
  --muted: #675f54;
  --accent: #bb5a2c;
  --accent-strong: #9c441a;
  --accent-soft: rgba(187, 90, 44, 0.12);
  --success: #2e8b57;
  --danger: #c14532;
  --shadow: 0 20px 60px rgba(56, 39, 17, 0.12);
  --radius-lg: 28px;
  --radius-md: 18px;
  --radius-sm: 12px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  font-family: "Trebuchet MS", "Gill Sans", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(255, 225, 180, 0.55), transparent 34%),
    radial-gradient(circle at bottom right, rgba(187, 90, 44, 0.18), transparent 28%),
    linear-gradient(180deg, #f6f1e8 0%, #efe5d3 100%);
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  padding: 24px;
}

.screen-root {
  min-height: calc(100vh - 48px);
}

.screen {
  width: min(1280px, 100%);
  margin: 0 auto;
}

.shell-card {
  background: var(--panel);
  backdrop-filter: blur(16px);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
}

.screen-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 20px;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.58);
  border: 1px solid rgba(97, 74, 40, 0.12);
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 700;
}

.headline {
  margin: 12px 0 10px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(36px, 6vw, 72px);
  line-height: 0.98;
  letter-spacing: -0.04em;
}

.subhead {
  max-width: 760px;
  font-size: 18px;
  line-height: 1.5;
  color: var(--muted);
}

.btn-row,
.stack-row,
.toolbar-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.btn,
.btn-secondary,
.btn-danger,
.btn-ghost {
  appearance: none;
  border: none;
  border-radius: 999px;
  padding: 12px 18px;
  font-weight: 700;
  transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
}

.btn:hover,
.btn-secondary:hover,
.btn-danger:hover,
.btn-ghost:hover {
  transform: translateY(-1px);
}

.btn {
  background: var(--accent);
  color: #fff9f3;
}

.btn-secondary {
  background: #264653;
  color: #f9fbfc;
}

.btn-danger {
  background: var(--danger);
  color: #fff7f5;
}

.btn-ghost {
  background: rgba(255, 255, 255, 0.58);
  color: var(--ink);
  border: 1px solid var(--panel-border);
}

.layout-grid {
  display: grid;
  gap: 18px;
}

.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(280px, 0.9fr);
  gap: 18px;
  align-items: stretch;
}

.panel {
  padding: 24px;
  border-radius: var(--radius-md);
  background: var(--panel-strong);
  border: 1px solid var(--panel-border);
}

.panel h2,
.panel h3 {
  margin-top: 0;
}

.callout {
  padding: 18px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, rgba(255, 247, 233, 0.96), rgba(255, 235, 211, 0.96));
  border: 1px solid rgba(187, 90, 44, 0.18);
}

.hour-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
}

.hour-card {
  padding: 18px;
  border-radius: 24px;
  border: 1px solid rgba(97, 74, 40, 0.12);
  background: rgba(255, 253, 248, 0.92);
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 180px;
}

.hour-card[data-has-lessons="true"] {
  background: linear-gradient(160deg, rgba(255, 251, 244, 0.95), rgba(255, 236, 214, 0.95));
  border-color: rgba(187, 90, 44, 0.22);
}

.hour-card-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}

.hour-card h3 {
  margin: 0;
  font-size: 24px;
}

.hour-card p {
  margin: 0;
  color: var(--muted);
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.status-pill--ready {
  background: rgba(46, 139, 87, 0.12);
  color: var(--success);
}

.status-pill--empty {
  background: rgba(103, 95, 84, 0.11);
  color: var(--muted);
}

.metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.metric {
  padding: 16px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid rgba(97, 74, 40, 0.1);
}

.metric-value {
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
}

.metric-label {
  margin-top: 6px;
  color: var(--muted);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.field,
.field-stack {
  display: grid;
  gap: 8px;
}

.field-stack {
  gap: 14px;
}

.label {
  font-weight: 700;
  color: var(--muted);
}

.input,
.textarea,
.select {
  width: 100%;
  border-radius: 14px;
  border: 1px solid rgba(97, 74, 40, 0.18);
  padding: 12px 14px;
  background: #fffdfa;
  color: var(--ink);
}

.textarea {
  min-height: 140px;
  resize: vertical;
}

.mapping-grid,
.lesson-list,
.roster-list {
  display: grid;
  gap: 10px;
}

.mapping-row,
.lesson-row {
  display: grid;
  grid-template-columns: minmax(130px, 180px) minmax(0, 1fr);
  gap: 12px;
  align-items: center;
}

.lesson-row {
  grid-template-columns: minmax(0, 1fr) auto;
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid rgba(97, 74, 40, 0.1);
}

.lesson-meta {
  display: grid;
  gap: 4px;
}

.hint,
.muted-text {
  color: var(--muted);
}

.hint {
  font-size: 13px;
}

.split-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
  gap: 18px;
}

.lesson-screen {
  position: fixed;
  inset: 0;
  width: auto;
  margin: 0;
  display: block;
  overflow: hidden;
  background:
    radial-gradient(circle at top left, rgba(255, 225, 180, 0.38), transparent 32%),
    radial-gradient(circle at bottom right, rgba(187, 90, 44, 0.14), transparent 26%),
    linear-gradient(180deg, #f7f2e9 0%, #efe5d3 100%);
}

.lesson-stage {
  min-height: 68vh;
  padding: 18px;
  border-radius: 24px;
  background: rgba(248, 244, 238, 0.94);
  border: 1px solid rgba(97, 74, 40, 0.12);
}

.lesson-stage--immersive {
  position: absolute;
  inset: 0;
  min-height: 100vh;
  padding: 34px 92px 16px 16px;
  border-radius: 0;
  background: transparent;
  border: none;
}

.lesson-stage-shell {
  position: relative;
  min-height: 100%;
  height: 100%;
  overflow: auto;
  border-radius: 26px;
  background: rgba(255, 251, 245, 0.88);
  border: 1px solid rgba(97, 74, 40, 0.12);
  box-shadow: 0 16px 48px rgba(56, 39, 17, 0.12);
}

.lesson-stage-shell.is-annotating,
.lesson-stage-shell.is-annotating .markdown-stage,
.lesson-stage-shell.is-annotating .pdf-stage,
.lesson-stage-shell.is-annotating .lesson-frame,
.lesson-stage-shell.is-annotating .blank-board-stage {
  overflow: hidden;
  touch-action: none;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: auto;
}

.lesson-frame {
  width: 100%;
  min-height: 62vh;
  border: none;
  border-radius: 18px;
  background: white;
}

.pdf-stage {
  min-height: 100%;
  overflow: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
  padding: 8px;
  background: #f4efe8;
  border-radius: 18px;
}

.pdf-page-canvas {
  display: block;
  width: min(100%, 1040px);
  height: auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 10px 28px rgba(56, 39, 17, 0.12);
}

.pdf-status {
  width: min(100%, 740px);
  padding: 16px 18px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid rgba(97, 74, 40, 0.12);
  color: var(--muted);
}

.markdown-stage {
  background: white;
  border-radius: 18px;
  padding: clamp(20px, 4vw, 48px);
  min-height: 100%;
  overflow: auto;
  line-height: 1.6;
  font-size: clamp(18px, 2vw, 28px);
}

.blank-board-stage {
  min-height: 100%;
}

.markdown-stage h1,
.markdown-stage h2,
.markdown-stage h3 {
  font-family: Georgia, "Times New Roman", serif;
  line-height: 1.1;
  letter-spacing: -0.03em;
}

.markdown-stage blockquote {
  margin-left: 0;
  padding-left: 14px;
  border-left: 4px solid var(--accent);
  color: var(--muted);
}

.markdown-stage code {
  font-family: Consolas, "Courier New", monospace;
  background: #f2ede6;
  border-radius: 6px;
  padding: 0.1em 0.32em;
}

.markdown-stage pre code {
  display: block;
  padding: 14px;
  overflow: auto;
}

.markdown-stage table {
  width: 100%;
  border-collapse: collapse;
}

.markdown-stage th,
.markdown-stage td {
  border: 1px solid rgba(97, 74, 40, 0.14);
  padding: 8px 10px;
  text-align: left;
}

.banner {
  padding: 14px 16px;
  border-radius: 14px;
  font-weight: 600;
  background: rgba(38, 70, 83, 0.08);
  color: #264653;
}

.behavior-grid,
.student-grid,
.report-grid,
.log-list,
.warning-row {
  display: grid;
  gap: 10px;
}

.behavior-grid,
.student-grid {
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
}

.choice-btn,
.student-chip,
.warning-chip,
.report-row {
  border-radius: 16px;
  border: 1px solid rgba(97, 74, 40, 0.14);
  background: rgba(255, 255, 255, 0.75);
}

.choice-btn,
.student-chip {
  padding: 12px 14px;
  font-weight: 700;
}

.choice-btn[data-kind="positive"] {
  background: rgba(46, 139, 87, 0.1);
  color: var(--success);
}

.choice-btn[data-kind="negative"] {
  background: rgba(193, 69, 50, 0.1);
  color: var(--danger);
}

.choice-btn.is-selected {
  box-shadow: inset 0 0 0 2px rgba(38, 70, 83, 0.3);
}

.warning-row {
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.warning-chip {
  padding: 10px 12px;
  font-weight: 700;
  color: #8a4b08;
  background: rgba(255, 180, 70, 0.18);
}

.log-entry {
  padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid rgba(97, 74, 40, 0.1);
  background: rgba(255, 255, 255, 0.7);
}

.log-entry strong {
  display: block;
  margin-bottom: 4px;
}

.report-filters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

.report-row {
  display: grid;
  grid-template-columns: 180px minmax(120px, 160px) minmax(120px, 140px) minmax(140px, 1fr) 110px;
  gap: 12px;
  padding: 12px 14px;
  align-items: center;
}

.report-chip {
  display: inline-flex;
  justify-content: center;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.report-chip--positive {
  color: var(--success);
  background: rgba(46, 139, 87, 0.12);
}

.report-chip--negative {
  color: var(--danger);
  background: rgba(193, 69, 50, 0.12);
}

.cold-call-name {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(28px, 4vw, 46px);
  letter-spacing: -0.04em;
  margin: 0;
}

.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}

.annotation-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  touch-action: none;
  z-index: 4;
}

.annotation-canvas.is-active {
  pointer-events: auto;
  cursor: crosshair;
}

.annotation-toolbar {
  position: absolute;
  top: 0;
  left: auto;
  z-index: 5;
  display: flex;
  flex-wrap: nowrap;
  gap: 4px;
  align-items: center;
  max-width: min(50vw, 520px);
  padding: 1px 4px;
  border-radius: 0 0 0 14px;
  background: rgba(255, 252, 246, 0.92);
  border: 1px solid rgba(97, 74, 40, 0.14);
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(56, 39, 17, 0.08);
  overflow-x: auto;
}

.annotation-toolbar.is-fixed-top {
  position: fixed;
  top: 0;
  right: 0;
}

.annotation-tool,
.annotation-swatch {
  border: 1px solid rgba(97, 74, 40, 0.16);
  background: rgba(255, 255, 255, 0.85);
}

.annotation-tool {
  padding: 0;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.annotation-tool--icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.annotation-tool.is-active {
  background: var(--accent);
  color: #fffaf2;
  border-color: var(--accent);
}

.annotation-swatch {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  padding: 0;
}

.annotation-swatch.is-active {
  box-shadow: 0 0 0 2px rgba(38, 70, 83, 0.25);
}

.empty-state {
  padding: 24px;
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.56);
  border: 1px dashed rgba(97, 74, 40, 0.22);
  color: var(--muted);
}

.hidden {
  display: none !important;
}

.lesson-topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: auto;
  z-index: 12;
  display: flex;
  align-items: center;
  gap: 6px;
  width: auto;
  max-width: calc(50vw - 12px);
  padding: 1px 6px 1px 1px;
  border-radius: 0 0 14px 0;
  background: rgba(255, 252, 246, 0.94);
}

.lesson-topbar-meta {
  min-width: 0;
}

.lesson-topbar-line,
.lesson-topbar-subline {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lesson-topbar-line {
  display: flex;
  align-items: center;
  gap: 0;
  font-weight: 800;
  font-size: clamp(12px, 1.2vw, 15px);
}

.lesson-action-rail {
  position: fixed;
  top: 64px;
  right: 12px;
  z-index: 13;
  display: grid;
  gap: 8px;
  padding: 10px 8px;
  border-radius: 22px;
  background: rgba(255, 252, 246, 0.92);
}

.lesson-action-btn,
.lesson-back-btn {
  width: 52px;
  height: 52px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(97, 74, 40, 0.15);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.84);
  color: var(--ink);
  transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
}

#backToHomeBtn {
  width: auto;
  height: auto;
  padding: 4px;
  border-radius: 10px;
}

.lesson-action-btn:hover,
.lesson-back-btn:hover {
  transform: translateY(-1px);
}

.lesson-action-btn.is-active,
.lesson-back-btn.is-active {
  background: var(--accent);
  color: #fffaf2;
  border-color: var(--accent);
}

.lesson-action-btn--small {
  width: 40px;
  height: 40px;
  border-radius: 14px;
}

.lesson-icon {
  display: inline-flex;
  width: 16px;
  height: 16px;
}

.lesson-icon svg {
  width: 100%;
  height: 100%;
}

.lesson-cold-call-badge {
  position: fixed;
  top: 64px;
  right: 86px;
  z-index: 11;
  min-width: 220px;
  max-width: min(360px, calc(100vw - 140px));
  padding: 16px 18px;
  border-radius: 22px;
  background: rgba(255, 251, 244, 0.92);
}

.lesson-warning-banner {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 12px;
  z-index: 11;
  padding: 10px 16px;
  border-radius: 16px;
  border: 1px solid rgba(186, 63, 40, 0.22);
  background: rgba(255, 244, 238, 0.96);
  box-shadow: 0 12px 28px rgba(123, 59, 33, 0.16);
  font-size: 15px;
  font-weight: 700;
  color: #8c2f1f;
  text-align: center;
}

.lesson-cold-call-name {
  margin: 10px 0 6px;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(28px, 3vw, 42px);
  line-height: 0.95;
}

.lesson-overlay-backdrop {
  position: fixed;
  inset: 0;
  z-index: 14;
  background: rgba(31, 27, 22, 0.28);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}

.lesson-overlay-backdrop.is-visible {
  opacity: 1;
  pointer-events: auto;
}

.lesson-behavior-drawer {
  position: fixed;
  top: 18px;
  right: 18px;
  bottom: 18px;
  z-index: 15;
  width: min(420px, calc(100vw - 24px));
  padding: 18px;
  border-radius: 28px;
  background: rgba(255, 250, 243, 0.96);
  transform: translateX(calc(100% + 24px));
  transition: transform 0.2s ease;
  overflow: auto;
  visibility: hidden;
  pointer-events: none;
}

.lesson-behavior-drawer.is-open {
  transform: translateX(0);
  visibility: visible;
  pointer-events: auto;
}

.lesson-drawer-header,
.lesson-drawer-subheader {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.lesson-drawer-header h2,
.lesson-drawer-section h3 {
  margin: 0;
}

.lesson-drawer-section {
  margin-top: 18px;
  display: grid;
  gap: 12px;
}

.lesson-drawer-stack,
.lesson-selection-banner {
  margin-top: 4px;
}

.lesson-behavior-grid,
.lesson-student-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.lesson-quick-add-wrap {
  display: grid;
  gap: 10px;
  margin-top: 4px;
}

@media (max-width: 980px) {
  .hero-grid,
  .split-layout {
    grid-template-columns: 1fr;
  }

  .lesson-topbar {
    max-width: calc(50vw - 10px);
  }

  .lesson-stage--immersive {
    padding-right: 78px;
  }
}

@media (max-width: 700px) {
  .app-shell {
    padding: 14px;
  }

  .mapping-row,
  .lesson-row,
  .report-row {
    grid-template-columns: 1fr;
  }

  .lesson-topbar {
    left: 0;
    right: auto;
    top: 0;
    max-width: calc(50vw - 8px);
    padding-right: 6px;
    border-radius: 0 0 12px 0;
  }

  .lesson-action-rail {
    top: auto;
    right: 12px;
    left: 12px;
    bottom: 12px;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    overflow-x: auto;
  }

  .lesson-stage--immersive {
    padding: 34px 12px 86px;
  }

  .annotation-toolbar.is-fixed-top {
    top: 0;
    right: 0;
    max-width: calc(50vw - 8px);
  }

  .lesson-cold-call-badge {
    top: 56px;
    left: 12px;
    right: 12px;
    max-width: none;
    min-width: 0;
  }

  .lesson-warning-banner {
    left: 12px;
    right: 12px;
    bottom: 72px;
    text-align: center;
  }

  .lesson-behavior-drawer {
    top: 12px;
    right: 12px;
    bottom: 72px;

// src/storage/settings-store.js
const { SettingsStore } = (() => {
function readJson(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (error) {
    return fallback;
  }
}

function writeJson(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

class SettingsStore {
  loadClassOptions() {
    const value = readJson(storageKeys.classOptions, null);
    return Array.isArray(value) && value.length ? value : [...defaultClassOptions];
  }

  saveClassOptions(classOptions) {
    writeJson(storageKeys.classOptions, classOptions);
  }

  loadHourMappings() {
    return readJson(storageKeys.hourToClassMapping, {});
  }

  saveHourMappings(mappings) {
    writeJson(storageKeys.hourToClassMapping, mappings);
  }

  loadHourRosters(hourMappings) {
    const legacyRosters = readJson("classRosters", defaultClassRosters);
    const rosters = readJson(storageKeys.hourRosters, null);
    const normalized = rosters && typeof rosters === "object" ? { ...rosters } : {};

    hourLabels.forEach((hour) => {
      if (!Array.isArray(normalized[hour])) {
        const mappedClass = hourMappings[hour];
        normalized[hour] = mappedClass && Array.isArray(legacyRosters[mappedClass])
          ? [...legacyRosters[mappedClass]]
          : [];
      }
    });

    writeJson(storageKeys.hourRosters, normalized);
    return normalized;
  }

  saveHourRosters(rosters) {
    writeJson(storageKeys.hourRosters, rosters);
  }

  loadAssignedClasses() {
    const assigned = readJson(storageKeys.assignedClasses, []);
    return Array.isArray(assigned) ? assigned : [];
  }

  saveAssignedClasses(classNames) {
    writeJson(storageKeys.assignedClasses, classNames);
  }

  loadPositiveSound() {
    return localStorage.getItem(storageKeys.positiveSound) || "";
  }

  savePositiveSound(dataUrl) {
    localStorage.setItem(storageKeys.positiveSound, dataUrl);
  }

  clearPositiveSound() {
    localStorage.removeItem(storageKeys.positiveSound);
  }

  loadBehaviorLogs() {
    const logs = readJson(storageKeys.logs, []);
    return Array.isArray(logs) ? logs : [];
  }

  saveBehaviorLogs(logs) {
    writeJson(storageKeys.logs, logs);
  }

  clearBehaviorLogs() {
    localStorage.removeItem(storageKeys.logs);
  }

  loadSession() {
    return readJson(storageKeys.session, null);
  }

  saveSession(session) {
    writeJson(storageKeys.session, session);
  }

  clearSession() {
    localStorage.removeItem(storageKeys.session);
  }
}
return { SettingsStore };
})();

// src/storage/lesson-db.js
const { LessonDatabase } = (() => {
function requestToPromise(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error("IndexedDB request failed"));
  });
}

function txDone(transaction) {
  return new Promise((resolve, reject) => {
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error("IndexedDB transaction failed"));
    transaction.onabort = () => reject(transaction.error || new Error("IndexedDB transaction aborted"));
  });
}

class LessonDatabase {
  constructor() {
    this.db = null;
  }

  async init() {
    if (this.db) {
      return this.db;
    }

    this.db = await new Promise((resolve, reject) => {
      const request = indexedDB.open(lessonDbConfig.name, lessonDbConfig.version);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;

        if (!db.objectStoreNames.contains(lessonDbConfig.legacyStoreName)) {
          db.createObjectStore(lessonDbConfig.legacyStoreName);
        }

        if (!db.objectStoreNames.contains(lessonDbConfig.lessonStoreName)) {
          const store = db.createObjectStore(lessonDbConfig.lessonStoreName, { keyPath: "id", autoIncrement: true });
          store.createIndex("className", "className", { unique: false });
        }

        if (event.oldVersion < 2) {
          const transaction = event.target.transaction;
          if (!transaction) {
            return;
          }

          const legacyStore = transaction.objectStore(lessonDbConfig.legacyStoreName);
          const lessonStore = transaction.objectStore(lessonDbConfig.lessonStoreName);
          legacyStore.openCursor().onsuccess = (cursorEvent) => {
            const cursor = cursorEvent.target.result;
            if (!cursor) {
              return;
            }

            if (cursor.key && cursor.value) {
              lessonStore.add({
                className: String(cursor.key),
                type: "pdf",
                name: cursor.value.name || `${String(cursor.key)} Lesson.pdf`,
                content: null,
                blob: cursor.value,
                addedAt: Date.now(),
                orderIndex: Number.MAX_SAFE_INTEGER
              });
            }

            cursor.continue();
          };
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error || new Error("Unable to open lesson database"));
    });

    return this.db;
  }

  getStore(storeName, mode = "readonly") {
    if (!this.db) {
      throw new Error("Lesson database is not initialized");
    }
    return this.db.transaction(storeName, mode).objectStore(storeName);
  }

  sortRecords(records) {
    return records.slice().sort((left, right) => {
      const leftOrder = Number.isFinite(Number(left.orderIndex)) ? Number(left.orderIndex) : Number.MAX_SAFE_INTEGER;
      const rightOrder = Number.isFinite(Number(right.orderIndex)) ? Number(right.orderIndex) : Number.MAX_SAFE_INTEGER;
      if (leftOrder !== rightOrder) {
        return leftOrder - rightOrder;
      }

      const leftTime = Number(left.addedAt || 0);
      const rightTime = Number(right.addedAt || 0);
      if (leftTime !== rightTime) {
        return leftTime - rightTime;
      }

      return Number(left.id || 0) - Number(right.id || 0);
    });
  }

  async getClassLessonRecords(className) {
    if (!className) {
      return [];
    }

    const store = this.getStore(lessonDbConfig.lessonStoreName);
    const index = store.index("className");
    const records = await requestToPromise(index.getAll(className));
    return this.sortRecords(records || []);
  }

  async getClassLessonCounts() {
    const transaction = this.db.transaction(lessonDbConfig.lessonStoreName, "readonly");
    const store = transaction.objectStore(lessonDbConfig.lessonStoreName);
    const counts = {};

    store.openCursor().onsuccess = (event) => {
      const cursor = event.target.result;
      if (!cursor) {
        return;
      }

      const className = String(cursor.value?.className || "").trim();
      if (className) {
        counts[className] = (counts[className] || 0) + 1;
      }
      cursor.continue();
    };

    await txDone(transaction);
    return counts;
  }

  async addPdfFiles(className, files) {
    const transaction = this.db.transaction([lessonDbConfig.lessonStoreName, lessonDbConfig.legacyStoreName], "readwrite");
    const store = transaction.objectStore(lessonDbConfig.lessonStoreName);
    const legacyStore = transaction.objectStore(lessonDbConfig.legacyStoreName);
    const now = Date.now();

    files.forEach((file, index) => {
      store.add({
        className,
        type: "pdf",
        name: file.name || `${className} Lesson.pdf`,
        content: null,
        blob: file,
        addedAt: now + index,
        orderIndex: Number.MAX_SAFE_INTEGER
      });
    });

    legacyStore.delete(className);
    await txDone(transaction);
  }

  async addMarkdownEntries(className, entries) {
    const transaction = this.db.transaction(lessonDbConfig.lessonStoreName, "readwrite");
    const store = transaction.objectStore(lessonDbConfig.lessonStoreName);
    const now = Date.now();

    entries.forEach((entry, index) => {
      store.add({
        className,
        type: "markdown",
        name: entry.name,
        content: entry.content,
        addedAt: now + index,
        orderIndex: Number.MAX_SAFE_INTEGER
      });
    });

    await txDone(transaction);
  }

  async addHtmlEntries(className, entries, type = "html") {
    const transaction = this.db.transaction(lessonDbConfig.lessonStoreName, "readwrite");
    const store = transaction.objectStore(lessonDbConfig.lessonStoreName);
    const now = Date.now();

    entries.forEach((entry, index) => {
      store.add({
        className,
        type,
        name: entry.name,
        content: entry.content,
        addedAt: now + index,
        orderIndex: Number.MAX_SAFE_INTEGER
      });
    });

    await txDone(transaction);
  }

  async reorderClassLessons(className, orderedIds) {
    const records = await this.getClassLessonRecords(className);
    const byId = new Map(records.map((record) => [Number(record.id), record]));
    const transaction = this.db.transaction(lessonDbConfig.lessonStoreName, "readwrite");
    const store = transaction.objectStore(lessonDbConfig.lessonStoreName);

    orderedIds.forEach((id, index) => {
      const record = byId.get(Number(id));
      if (!record) {
        return;
      }
      store.put({ ...record, orderIndex: index });
    });

    await txDone(transaction);
  }

  async clearClassLessons(className) {
    const transaction = this.db.transaction([lessonDbConfig.lessonStoreName, lessonDbConfig.legacyStoreName], "readwrite");
    const store = transaction.objectStore(lessonDbConfig.lessonStoreName);
    const index = store.index("className");

    index.openCursor(IDBKeyRange.only(className)).onsuccess = (event) => {
      const cursor = event.target.result;
      if (!cursor) {
        return;
      }
      cursor.delete();
      cursor.continue();
    };

    transaction.objectStore(lessonDbConfig.legacyStoreName).delete(className);
    await txDone(transaction);
  }

  async clearAllLessons() {
    const transaction = this.db.transaction([lessonDbConfig.lessonStoreName, lessonDbConfig.legacyStoreName], "readwrite");
    transaction.objectStore(lessonDbConfig.lessonStoreName).clear();
    transaction.objectStore(lessonDbConfig.legacyStoreName).clear();
    await txDone(transaction);
  }
}
return { LessonDatabase };
})();

// src/services/app-model.js
const { AppModel } = (() => {
class AppModel {
  constructor({ settingsStore, lessonDb }) {
    this.settingsStore = settingsStore;
    this.lessonDb = lessonDb;
    this.classOptions = [];
    this.hourMappings = {};
    this.hourRosters = {};
    this.lessonCounts = {};
    this.assignedClasses = [];
  }

  async hydrate() {
    this.classOptions = this.settingsStore.loadClassOptions();
    this.hourMappings = this.settingsStore.loadHourMappings();
    this.hourRosters = this.settingsStore.loadHourRosters(this.hourMappings);
    await this.refreshLessonMetadata();
  }

  async refreshLessonMetadata() {
    this.lessonCounts = await this.lessonDb.getClassLessonCounts();
    this.assignedClasses = Object.keys(this.lessonCounts).sort((left, right) => left.localeCompare(right));
    this.settingsStore.saveAssignedClasses(this.assignedClasses);
  }

  needsSetup() {
    return Object.keys(this.hourMappings).length === 0;
  }

  getHoursViewModel() {
    return hourLabels
      .map((hour) => {
        const className = this.hourMappings[hour] || "";
        const lessonCount = className ? this.lessonCounts[className] || 0 : 0;
        const rosterCount = Array.isArray(this.hourRosters[hour]) ? this.hourRosters[hour].length : 0;
        return {
          hour,
          className,
          lessonCount,
          hasLessons: lessonCount > 0,
          rosterCount,
          hasRoster: rosterCount > 0
        };
      })
      .filter((entry) => entry.className);
  }

  getMetrics() {
    const mappedHours = hourLabels.filter((hour) => !!this.hourMappings[hour]).length;
    const totalLessons = Object.values(this.lessonCounts).reduce((sum, count) => sum + count, 0);
    return {
      mappedHours,
      storedClasses: this.assignedClasses.length,
      totalLessons
    };
  }

  parseClassList(text) {
    const nextOptions = Array.from(new Set(
      String(text || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
    ));
    return nextOptions;
  }

  saveClassList(text) {
    const nextOptions = this.parseClassList(text);
    if (!nextOptions.length) {
      throw new Error("Enter at least one class name.");
    }

    this.classOptions = nextOptions;
    Object.keys(this.hourMappings).forEach((hour) => {
      if (!this.classOptions.includes(this.hourMappings[hour])) {
        this.hourMappings[hour] = "";
      }
    });

    this.settingsStore.saveClassOptions(this.classOptions);
    this.settingsStore.saveHourMappings(this.hourMappings);
    this.settingsStore.saveHourRosters(this.hourRosters);
    return this.classOptions;
  }

  setHourMapping(hour, className) {
    this.hourMappings[hour] = className;
    if (!Array.isArray(this.hourRosters[hour])) {
      this.hourRosters[hour] = [];
    }
    this.settingsStore.saveHourMappings(this.hourMappings);
    this.settingsStore.saveHourRosters(this.hourRosters);
  }

  getRoster(hour) {
    return Array.isArray(this.hourRosters[hour]) ? this.hourRosters[hour] : [];
  }

  saveRoster(hour, text) {
    const roster = String(text || "")
      .split(/\r?\n/)
      .map((line) => line.trim())
      .filter(Boolean);

    this.hourRosters[hour] = roster;
    this.settingsStore.saveHourRosters(this.hourRosters);
    return roster;
  }

  async addPdfFiles(className, files) {
    await this.lessonDb.addPdfFiles(className, files);
    await this.refreshLessonMetadata();
  }

  async convertDocxFiles(className, files) {
    const mammoth = window.mammoth;
    if (!mammoth || typeof mammoth.convertToHtml !== "function") {
      throw new Error("DOCX import is not available right now.");
    }

    const entries = [];
    for (const file of files) {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer });
      entries.push({
        name: file.name || `${className} Lesson.docx`,
        content: result.value || ""
      });
    }

    return entries;
  }

  classifyLessonFiles(files) {
    const pdfFiles = [];
    const markdownFiles = [];
    const docxFiles = [];
    const unsupportedFiles = [];

    files.forEach((file) => {
      const lowerName = String(file.name || "").toLowerCase();
      if (file.type === "application/pdf" || lowerName.endsWith(".pdf")) {
        pdfFiles.push(file);
        return;
      }
      if (file.type === "text/markdown" || file.type === "text/plain" || lowerName.endsWith(".md")) {
        markdownFiles.push(file);
        return;
      }
      if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document" || lowerName.endsWith(".docx")) {
        docxFiles.push(file);
        return;
      }
      unsupportedFiles.push(file);
    });

    return { pdfFiles, markdownFiles, docxFiles, unsupportedFiles };
  }

  async addLessonFiles(className, files) {
    const { pdfFiles, markdownFiles, docxFiles, unsupportedFiles } = this.classifyLessonFiles(files);

    if (pdfFiles.length) {
      await this.lessonDb.addPdfFiles(className, pdfFiles);
    }

    if (markdownFiles.length) {
      const entries = [];
      for (const file of markdownFiles) {
        const content = await file.text();
        entries.push({
          name: file.name || `${className} Lesson.md`,
          content
        });
      }
      await this.lessonDb.addMarkdownEntries(className, entries);
    }

    if (docxFiles.length) {
      const entries = await this.convertDocxFiles(className, docxFiles);
      await this.lessonDb.addHtmlEntries(className, entries, "docx");
    }

    await this.refreshLessonMetadata();
    return {
      addedCount: pdfFiles.length + markdownFiles.length + docxFiles.length,
      pdfCount: pdfFiles.length,
      markdownCount: markdownFiles.length,
      docxCount: docxFiles.length,
      unsupportedCount: unsupportedFiles.length,
      unsupportedNames: unsupportedFiles.map((file) => file.name || "Unknown file")
    };
  }

  async addMarkdownFiles(className, files) {
    const entries = [];
    for (const file of files) {
      const content = await file.text();
      entries.push({
        name: file.name || `${className} Lesson.md`,
        content
      });
    }
    await this.lessonDb.addMarkdownEntries(className, entries);
    await this.refreshLessonMetadata();
  }

  async addMarkdownText(className, title, content) {
    await this.lessonDb.addMarkdownEntries(className, [{
      name: title || `Markdown Lesson ${new Date().toLocaleDateString()}`,
      content
    }]);
    await this.refreshLessonMetadata();
  }

  async getLessonsForClass(className) {
    return this.lessonDb.getClassLessonRecords(className);
  }

  async getLessonSequenceForClass(className) {
    const storedLessons = await this.getLessonsForClass(className);
    return [...storedLessons, this.createBlankBoardLesson(className)];
  }

  createBlankBoardLesson(className) {
    return {
      id: `blank-board::${className}`,
      className,
      type: "blank",
      name: "Blank Board",
      content: "",
      addedAt: 0,
      isVirtual: true
    };
  }

  async clearLessonsForClass(className) {
    await this.lessonDb.clearClassLessons(className);
    await this.refreshLessonMetadata();
  }

  async clearAllLessons() {
    await this.lessonDb.clearAllLessons();
    await this.refreshLessonMetadata();
  }

  async reorderLessons(className, orderedIds) {
    await this.lessonDb.reorderClassLessons(className, orderedIds);
  }

  loadSession() {
    return this.settingsStore.loadSession();
  }

  saveSession(session) {
    this.settingsStore.saveSession(session);
  }

  clearSession() {
    this.settingsStore.clearSession();
  }
}
return { AppModel };
})();

// src/services/annotation-service.js
const { AnnotationService } = (() => {
const toolbarPositionKey = "lessonCockpitAnnotationToolbarPosition";
const penDefaultColor = "#1d1d1f";
const highlighterDefaultColor = "#ffd60a";
const highlighterColors = new Set(["#ffd60a", "#32d74b", "#64d2ff"]);

class AnnotationService {
  constructor() {
    this.mode = false;
    this.tool = "pen";
    this.color = penDefaultColor;
    this.toolbarPosition = localStorage.getItem(toolbarPositionKey) || "top";
    this.strokesByLesson = new Map();
    this.activeStroke = null;
    this.activePointerId = null;
  }

  getLessonStrokes(lessonKey) {
    if (!this.strokesByLesson.has(lessonKey)) {
      this.strokesByLesson.set(lessonKey, []);
    }
    return this.strokesByLesson.get(lessonKey);
  }

  getViewModel(lessonKey) {
    return {
      lessonKey,
      mode: this.mode,
      tool: this.tool,
      color: this.color,
      toolbarPosition: this.toolbarPosition,
      strokeCount: this.getLessonStrokes(lessonKey).length
    };
  }

  getConfig(tool = this.tool) {
    if (tool === "highlighter") {
      return { width: 16, alpha: 0.22, composite: "source-over" };
    }
    if (tool === "eraser") {
      return { width: 22, alpha: 1, composite: "destination-out" };
    }
    return { width: 2, alpha: 1, composite: "source-over" };
  }

  toggleMode() {
    this.mode = !this.mode;
    if (!this.mode) {
      this.activeStroke = null;
      this.activePointerId = null;
    }
  }

  toggleToolbarPosition() {
    this.toolbarPosition = this.toolbarPosition === "bottom" ? "top" : "bottom";
    localStorage.setItem(toolbarPositionKey, this.toolbarPosition);
  }

  setTool(tool) {
    this.tool = tool;
    if (tool === "highlighter") {
      if (!highlighterColors.has(this.color.toLowerCase())) {
        this.color = highlighterDefaultColor;
      }
      return;
    }
    if (tool === "pen" && highlighterColors.has(this.color.toLowerCase())) {
      this.color = penDefaultColor;
    }
  }

  setColor(color) {
    this.color = color;
    if (this.tool === "eraser") {
      this.tool = "pen";
    }
  }

  startStroke(lessonKey, pointerId, point) {
    const stroke = {
      tool: this.tool,
      color: this.color,
      points: [point]
    };
    this.activePointerId = pointerId;
    this.activeStroke = stroke;
    this.getLessonStrokes(lessonKey).push(stroke);
    return stroke;
  }

  appendPoint(pointerId, point) {
    if (!this.activeStroke || this.activePointerId !== pointerId) {
      return null;
    }
    this.activeStroke.points.push(point);
    return this.activeStroke;
  }

  endStroke(pointerId) {
    if (this.activePointerId !== pointerId) {
      return;
    }
    this.activePointerId = null;
    this.activeStroke = null;
  }

  undo(lessonKey) {
    const strokes = this.getLessonStrokes(lessonKey);
    if (strokes.length) {
      strokes.pop();
    }

// src/services/behavior-service.js
const { BehaviorService } = (() => {
class BehaviorService {
  constructor(settingsStore) {
    this.settingsStore = settingsStore;
  }

  getLogs() {
    return this.settingsStore.loadBehaviorLogs();
  }

  saveLogs(logs) {
    this.settingsStore.saveBehaviorLogs(logs);
  }

  addLog(entry) {
    const logs = this.getLogs();
    logs.push(entry);
    this.saveLogs(logs);
    return entry;
  }

  clearLogs() {
    this.settingsStore.clearBehaviorLogs();
  }

  getRecommendationForPoints(points) {
    if (points >= 10) return "Admin referral";
    if (points >= 7) return "Parent contact";
    if (points >= 5) return "Reflection sheet";
    if (points >= 3) return "Stay after class";
    return "";
  }

  getTodayHourLogs(hour) {
    if (!hour) {
      return [];
    }
    const today = new Date().toISOString().split("T")[0];
    return this.getLogs().filter((log) => log.timestamp.split("T")[0] === today && log.hour === hour);
  }

  getWarningMap(hour) {
    const counts = this.getTodayHourLogs(hour)
      .filter((log) => log.type === "negative")
      .reduce((totals, log) => {
        const category = String(log.category || "").trim();
        if (!category) {
          return totals;
        }
        totals[category] = (totals[category] || 0) + 1;
        return totals;
      }, {});

    return Object.fromEntries(
      Object.entries(counts).filter(([, count]) => count >= 3)
    );
  }

  getHourSummary(hour, className) {
    const todayLogs = this.getTodayHourLogs(hour);
    const negativeTotals = todayLogs
      .filter((log) => log.type === "negative")
      .reduce((totals, log) => {
        const student = String(log.student || "").trim();
        if (!student) {
          return totals;
        }
        totals[student] = (totals[student] || 0) + Math.max(0, Number(log.points || 0));
        return totals;
      }, {});

    const recommendations = Object.entries(negativeTotals)
      .map(([student, points]) => ({
        student,
        points,
        recommendation: this.getRecommendationForPoints(points)
      }))
      .filter((entry) => entry.recommendation)
      .sort((left, right) => right.points - left.points || left.student.localeCompare(right.student));

    return {
      title: hour,
      className,
      totalEntries: todayLogs.length,
      negativePointTotal: Object.values(negativeTotals).reduce((sum, value) => sum + value, 0),
      negativeTotals,
      recommendations,
      recentLogs: todayLogs.slice().sort((left, right) => new Date(right.timestamp) - new Date(left.timestamp))
    };
  }

  getFilteredLogs(filters) {
    const {
      dateFrom = "",
      dateTo = "",
      className = "",
      studentQuery = "",
      type = ""
    } = filters;

    const loweredStudent = String(studentQuery || "").trim().toLowerCase();
    return this.getLogs().filter((log) => {
      const logDate = String(log.timestamp || "").split("T")[0];
      const matchesDate = (!dateFrom || logDate >= dateFrom) && (!dateTo || logDate <= dateTo);
      const matchesClass = !className || log.class === className;
      const matchesStudent = !loweredStudent || String(log.student || "").toLowerCase().includes(loweredStudent);
      const matchesType = !type || log.type === type;
      return matchesDate && matchesClass && matchesStudent && matchesType;
    });
  }

  getReportStats(logs) {
    return {
      totalEntries: logs.length,
      positiveCount: logs.filter((log) => log.type === "positive").length,
      negativeCount: logs.filter((log) => log.type === "negative").length,
      uniqueStudents: new Set(logs.map((log) => log.student)).size
    };
  }

  exportCsv(logs) {
    const headers = ["Date", "Time", "Student", "Class", "Hour", "Category", "Type", "Points"];
    const rows = logs
      .slice()
      .sort((left, right) => new Date(right.timestamp) - new Date(left.timestamp))
      .map((log) => {
        const date = new Date(log.timestamp).toLocaleDateString("en-US");
        const time = new Date(log.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        return [date, time, log.student, log.class, log.hour || "", log.category, log.type, String(log.points || 0)];
      });

    return [
      headers.join(","),
      ...rows.map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(","))
    ].join("\n");
  }
}
return { BehaviorService };
})();

// src/renderers/lesson-renderer.js
const { splitMarkdownSlides, buildLessonStageModel, initializeLessonStage } = (() => {
let activePdfRenderToken = 0;

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function splitMarkdownSlides(content) {
  const slides = String(content || "")
    .split(/\r?\n\s*---\s*\r?\n/g)
    .map((slide) => slide.trim())
    .filter(Boolean);
  return slides.length ? slides : [String(content || "")];
}

function fallbackMarkdown(markdown) {
  return `<pre>${escapeHtml(markdown)}</pre>`;
}

function normalizeDisplayMathBlocks(container) {
  if (!container) {
    return;
  }

  const nodes = Array.from(container.children || []);
  let index = 0;

  while (index < nodes.length) {
    const startNode = nodes[index];
    const isStart = startNode && startNode.tagName === "P" && startNode.textContent.trim() === "$$";
    if (!isStart) {
      index += 1;
      continue;
    }

    let endIndex = -1;
    for (let scan = index + 1; scan < nodes.length; scan += 1) {
      const candidate = nodes[scan];
      const isEnd = candidate && candidate.tagName === "P" && candidate.textContent.trim() === "$$";
      if (isEnd) {
        endIndex = scan;
        break;
      }
    }

    if (endIndex === -1) {
      index += 1;
      continue;
    }

    const lines = nodes.slice(index + 1, endIndex)
      .map((node) => (node.textContent || "").trim())
      .filter(Boolean);

    const wrapper = document.createElement("div");
    wrapper.textContent = `$$\n${lines.join("\n")}\n$$`;

    startNode.replaceWith(wrapper);
    nodes.slice(index + 1, endIndex).forEach((node) => node.remove());
    nodes[endIndex].remove();

    const updated = Array.from(container.children || []);
    nodes.length = 0;
    updated.forEach((node) => nodes.push(node));
    index += 1;
  }
}

function renderMath(container) {
  if (!container || typeof window.renderMathInElement !== "function") {
    return;
  }

  try {
    window.renderMathInElement(container, {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$", right: "$", display: false }
      ],
      throwOnError: false
    });
  } catch (error) {
    // Keep lesson rendering resilient if math parsing fails.
  }
}

function buildLessonStageModel(record, markdownSlideIndex) {
  if (!record) {
    return {
      type: "empty",
      slideCount: 0,
      html: '<div class="empty-state">No lesson is loaded.</div>'
    };
  }

  if (record.type === "blank") {
    return {
      type: "blank",
      slideCount: 0,
      record,
      html: '<div id="lessonRenderSurface" class="markdown-stage blank-board-stage"></div>'
    };
  }

  if (record.type === "pdf") {
    return {
      type: "pdf",
      slideCount: 0,
      record,
      html: '<div id="lessonRenderSurface" class="pdf-stage"><div class="pdf-status">Loading PDF...</div></div>'
    };
  }

  if (record.type === "docx" || record.type === "html") {
    return {
      type: record.type,
      slideCount: 0,
      record,
      html: `<div id="lessonRenderSurface" class="markdown-stage">${record.content || "<div class=\"empty-state\">This DOCX lesson was imported without readable content.</div>"}</div>`
    };
  }

  const slides = splitMarkdownSlides(record.content || "");
  const safeIndex = Math.min(Math.max(markdownSlideIndex, 0), Math.max(slides.length - 1, 0));
  const markdown = slides[safeIndex] || "";
  const parsedHtml = window.marked && typeof window.marked.parse === "function"
    ? window.marked.parse(markdown)
    : fallbackMarkdown(markdown);

  return {
    type: "markdown",
    slideCount: slides.length,
    record,
    html: `<div id="lessonRenderSurface" class="markdown-stage">${parsedHtml}</div>`
  };
}

async function renderPdfStage(surface, blob, renderToken) {
  if (!surface || !blob) {
    return;
  }

  surface.innerHTML = '<div class="pdf-status">Loading PDF...</div>';

  try {
    const data = await blob.arrayBuffer();
    if (renderToken !== activePdfRenderToken) {
      return;
    }

    const loadingTask = pdfjsLib.getDocument({ data });
    const pdf = await loadingTask.promise;
    if (renderToken !== activePdfRenderToken) {
      return;
    }

    surface.innerHTML = "";
    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
      const page = await pdf.getPage(pageNumber);
      if (renderToken !== activePdfRenderToken) {
        return;
      }

      const baseViewport = page.getViewport({ scale: 1 });
      const maxWidth = Math.min(surface.clientWidth || 1040, 1040);
      const scale = Math.min(2, Math.max(1, maxWidth / baseViewport.width));
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement("canvas");
      canvas.className = "pdf-page-canvas";

      const context = canvas.getContext("2d");
      const outputScale = window.devicePixelRatio || 1;
      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;
      context.setTransform(outputScale, 0, 0, outputScale, 0, 0);
      surface.appendChild(canvas);
      await page.render({ canvasContext: context, viewport }).promise;
    }
  } catch (error) {
    if (renderToken !== activePdfRenderToken) {
      return;
    }
    surface.innerHTML = '<div class="pdf-status">Unable to display this PDF. Try re-adding the file if the problem continues.</div>';
  }
}

async function initializeLessonStage(stageModel) {
  const surface = document.getElementById("lessonRenderSurface");
  if (!surface || !stageModel) {
    return;
  }

  if (stageModel.type === "markdown") {
    normalizeDisplayMathBlocks(surface);
    renderMath(surface);
    return;
  }

  if (stageModel.type === "docx" || stageModel.type === "html") {
    renderMath(surface);
    return;
  }

  if (stageModel.type === "blank") {
    return;
  }

  if (stageModel.type === "pdf") {
    const renderToken = ++activePdfRenderToken;
    await renderPdfStage(surface, stageModel.record?.blob, renderToken);
  }
}
return { splitMarkdownSlides, buildLessonStageModel, initializeLessonStage };
})();

          </div>
        </div>

      <section class="shell-card panel report-grid">
        ${rows}
      </section>
    </section>
  `;

  container.querySelector("#backAdminBtn")?.addEventListener("click", actions.backAdmin);
  container.querySelector("#exportCsvBtn")?.addEventListener("click", actions.exportCsv);
  container.querySelector("#clearLogsBtn")?.addEventListener("click", actions.clearLogs);

  ["#filterDateFrom", "#filterDateTo", "#filterClass", "#filterStudent", "#filterType"].forEach((selector) => {
    container.querySelector(selector)?.addEventListener("change", () => {
      actions.updateFilters({

        dateTo: container.querySelector("#filterDateTo")?.value || "",
        className: container.querySelector("#filterClass")?.value || "",
        studentQuery: container.querySelector("#filterStudent")?.value || "",
        type: container.querySelector("#filterType")?.value || ""
      });
    });
  });
}
return { renderReportScreen };
